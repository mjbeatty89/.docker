# Cloudflare API credentials for SWAG Let's Encrypt DNS validation
# You can get these from https://dash.cloudflare.com/profile/api-tokens

# Option 1: Using API Token (RECOMMENDED - more secure)
# Create a Custom Token with Zone:Zone:Read, Zone:DNS:Edit permissions
# dns_cloudflare_api_token = your_api_token_here

# Option 2: Using Global API Key (less secure, but works)
# dns_cloudflare_email = your-email@domain.com
# dns_cloudflare_api_key = your_global_api_key_here

# IMPORTANT: Uncomment and fill in ONE of the above options
# Remove the # from the beginning of the lines you want to use

# Example using API Token (recommended):
# dns_cloudflare_api_token = abcdef123456789abcdef123456789abcdef123456

# Example using Global API Key:
# dns_cloudflare_email = user@example.com
# dns_cloudflare_api_key = abcdef123456789abcdef123456789abcdef12345
